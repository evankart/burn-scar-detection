# Prithvi-EO-2.0-300M encoder fine-tune. Inherits the fire registry and all
# unset values from train_config.yaml; only the fine-tune overrides live here.
extends: train_config.yaml

data:
  # Hold out whole fires for validation (fire-based split, not random patches).
  val_fires: ["carr_fire_2018", "holy_2018"]
model:
  freeze_backbone: true
  unfreeze_after_epoch: 2   # decoder-only warmup, then unfreeze the encoder

training:
  batch_size: 2   # ViT-Large OOMs at 4 on A10G 24GB; using 2
  epochs: 16
  learning_rate: 3.0e-4
  backbone_lr_multiplier: 0.05   # encoder base LR = 5% of decoder LR
  llrd_decay: 0.75               # shallow encoder layers get progressively lower LR
  weight_decay: 0.05
  warmup_epochs: 1
  early_stopping_patience: 5
  class_weights: [0.5, 0.5]      # neutral; fine-tuning can learn precision directly
  tversky_alpha: 0.5
  tversky_beta: 0.5
  augmentations:
    random_resized_crop: true

logging:
  project_name: burn-scar-detection-finetune
