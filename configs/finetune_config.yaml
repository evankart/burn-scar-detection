model:
  num_classes: 2
  in_channels: 6
  freeze_backbone: true
  unfreeze_after_epoch: 2
  prithvi_version: '2.0'
training:
  batch_size: 16
  epochs: 16
  learning_rate: 0.0003
  backbone_lr_multiplier: 0.05
  weight_decay: 0.05
  warmup_epochs: 1
  early_stopping_patience: 5
  mixed_precision: true
  seed: 42
  class_weights:
  - 0.5
  - 0.5
  augmentations:
    random_flip: true
    random_rotate: true
    random_crop: true
    color_jitter: false
    random_resized_crop: true
  llrd_decay: 0.75
  tversky_alpha: 0.5
  tversky_beta: 0.5
logging:
  project_name: burn-scar-detection-finetune
  log_every_n_steps: 10
  metric_monitor: val_mean_iou
