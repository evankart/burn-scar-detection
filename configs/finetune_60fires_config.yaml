# Finetune on 60 stratified fires (37 US + 23 global, all biomes represented).
# Faster than 92 fires (~6-8 hrs vs 40+ hrs for 16 epochs) while maintaining global diversity.
extends: train_60fires_config.yaml

data:
  val_fires: ["carr_fire_2018", "holy_2018"]

model:
  freeze_backbone: true
  unfreeze_after_epoch: 2

training:
  batch_size: 2
  epochs: 16
  learning_rate: 3.0e-4
  backbone_lr_multiplier: 0.05
  llrd_decay: 0.75
  weight_decay: 0.05
  warmup_epochs: 1
  early_stopping_patience: 5
  class_weights: [0.5, 0.5]
  tversky_alpha: 0.5
  tversky_beta: 0.5
  augmentations:
    random_resized_crop: true

logging:
  project_name: burn-scar-detection-finetune-60fires
