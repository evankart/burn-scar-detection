# Optimized finetune: 50 fires, 12 epochs, minimal augmentation.
# Target: ~7-9 hours total (Optuna 2-3h + final retrain 5-6h)
# Cost control: auto-terminate after job completion
extends: train_50fires_config.yaml

data:
  val_fires: ["carr_fire_2018", "holy_2018"]

model:
  freeze_backbone: true
  unfreeze_after_epoch: 2

training:
  batch_size: 2
  epochs: 12  # Reduced from 16
  learning_rate: 3.0e-4
  backbone_lr_multiplier: 0.05
  llrd_decay: 0.75
  weight_decay: 0.05
  warmup_epochs: 1
  early_stopping_patience: 4  # Stricter early stopping
  class_weights: [0.5, 0.5]
  tversky_alpha: 0.5
  tversky_beta: 0.5
  augmentations:
    # Minimal augmentation for speed (only essential transforms)
    random_resized_crop: false  # Skip expensive crop-resize
    random_flip: true
    random_rotation: false  # Skip rotation
    brightness_jitter: false
    contrast_jitter: false

logging:
  project_name: burn-scar-detection-finetune-50fires
  metric_monitor: val_iou_burn_scar
