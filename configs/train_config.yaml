# Burn Scar Detection - Training Configuration (frozen encoder)
# Single fire registry: each entry tagged role=train|test. The train/test
# splits are DERIVED from these roles by src.data.load_config, so they can
# never drift. finetune_config.yaml is generated from this file.

data:
  bands:
  - B02
  - B03
  - B04
  - B8A
  - B11
  - B12
  patch_size: 224
  train_split: 0.9
  num_workers: 4
  cache_dir: ./data/cache
  dnbr_threshold: 0.1
  pred_threshold: 0.65
  fires:
