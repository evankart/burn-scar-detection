model:
  num_classes: 2
  in_channels: 6
  freeze_backbone: true
  unfreeze_after_epoch: 999
training:
  batch_size: 16
  epochs: 8
  learning_rate: 0.0005
  backbone_lr_multiplier: 0.1
  weight_decay: 0.01
  warmup_epochs: 1
  early_stopping_patience: 3
  mixed_precision: true
  seed: 42
  class_weights:
  - 0.3
  - 0.7
  augmentations:
    random_flip: true
    random_rotate: true
    random_crop: true
    color_jitter: false
logging:
  project_name: burn-scar-detection
  log_every_n_steps: 10
  metric_monitor: val_mean_iou
