# Burn Scar Detection - Training Configuration

data:
  bands: ["B02", "B03", "B04", "B8A", "B11", "B12"]
  patch_size: 224
  train_split: 0.9   # of train-fire patches; rest goes to val
  num_workers: 4
  cache_dir: "./data/cache"
  # dNBR cutoff for the burn label. Must be identical for training labels and
  # held-out evaluation — a mismatch trains the model on one definition of
  # "burned" and scores it against another. 0.10 = USGS unburned/low-severity
  # boundary, capturing the full burn perimeter (vs 0.27 = moderate+ only).
  dnbr_threshold: 0.10
  # Decision threshold on the burn-class softmax prob. Calibrated ONLY on
  # training-fire scenes (never the held-out test fires) to avoid leakage.
  pred_threshold: 0.5

  # --- Test fires (held-out, not in training set) ---
  test_regions:
    - name: "woolsey_fire_2018"
      lat: 34.16
      lon: -118.83
      buffer_km: 20
      pre_fire_date: "2018-10-01"
      post_fire_date: "2018-11-20"

    - name: "east_troublesome_2020"
      lat: 40.15
      lon: -105.85
      buffer_km: 30
      pre_fire_date: "2020-08-01"
      post_fire_date: "2020-11-15"

    - name: "thomas_fire_2017"
      lat: 34.50
      lon: -119.10
      buffer_km: 45
      pre_fire_date: "2017-09-01"
      post_fire_date: "2018-01-15"

