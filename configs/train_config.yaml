  # Hard-negative regions (unburned SoCal dry terrain) were tested as a fix for
  # land over-prediction but did not improve held-out precision/IoU on the SoCal
  # test fires — see results/over_prediction_analysis.md. Left out of the default
  # training set. To reproduce the experiment, add a `negative_regions:` list
  # here (run_training.py picks it up automatically) with the verified-unburned
  # scenes documented in the analysis.

model:
  num_classes: 2
  in_channels: 6
  freeze_backbone: true
  unfreeze_after_epoch: 999

training:
  batch_size: 16
  epochs: 8
  learning_rate: 5.0e-4
  backbone_lr_multiplier: 0.1
  weight_decay: 0.01
  warmup_epochs: 1
  early_stopping_patience: 3
  mixed_precision: true
  seed: 42
  class_weights: [0.3, 0.7]
  augmentations:
    random_flip: true
    random_rotate: true
    random_crop: true
    color_jitter: false

logging:
  project_name: "burn-scar-detection"
  log_every_n_steps: 10
  metric_monitor: "val_mean_iou"
